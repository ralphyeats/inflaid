services:
  - type: web
    name: inflaid-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        value: https://www.inflaid.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_STARTER_VARIANT
        sync: false
      - key: LEMONSQUEEZY_GROWTH_VARIANT
        sync: false
      - key: LEMONSQUEEZY_PRO_VARIANT
        sync: false
      - key: FOUNDER_EMAILS
        value: ralphyeats@gmail.com,ralphyeatss@gmail.com
