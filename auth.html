<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflaid - Sign in</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,500..800,40,1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050609;
  --panel:rgba(247,241,232,.075);
  --panel2:rgba(247,241,232,.045);
  --line:rgba(247,241,232,.14);
  --ink:#F7F1E8;
  --muted:rgba(247,241,232,.64);
  --dim:rgba(247,241,232,.40);
  --accent:#9DFFB3;
  --blue:#8EA5FF;
  --green:#9DFFB3;
  --red:#FF7182;
  --syne:'Fraunces',serif;
  --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --shadow:0 40px 140px rgba(0,0,0,.52);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  color:var(--ink);
  font-family:var(--sans);
  padding:28px;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 16% 10%,rgba(142,165,255,.24),transparent 28%),
    radial-gradient(circle at 82% 16%,rgba(157,255,179,.18),transparent 26%),
    linear-gradient(135deg,rgba(255,255,255,.045) 0 1px,transparent 1px) 0 0/42px 42px,
    linear-gradient(180deg,#050609 0%,#0A0D14 52%,#050609 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.20;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E");
  mix-blend-mode:soft-light;
}
a{color:inherit}
.logo{position:fixed;top:24px;left:28px;display:flex;align-items:center;gap:10px;text-decoration:none;z-index:3}
.logo-mark{width:34px;height:34px;background:var(--ink);color:var(--bg);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 34px rgba(247,241,232,.18)}
.logo-mark svg{display:block}
.logo-text{font-family:var(--sans);font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.04em}
.auth-shell{width:min(1040px,100%);display:grid;grid-template-columns:1fr 430px;gap:28px;align-items:center;position:relative;z-index:1}
.auth-hero{
  min-height:560px;
  border:1px solid var(--line);
  border-radius:38px;
  padding:42px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:linear-gradient(145deg,rgba(247,241,232,.09),rgba(247,241,232,.035));
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.10);
  overflow:hidden;
  position:relative;
}
.auth-hero::before{
  content:"";
  position:absolute;
  width:430px;
  height:430px;
  right:-120px;
  bottom:-130px;
  border-radius:44% 56% 50% 50%;
  background:conic-gradient(from 210deg,var(--accent),var(--blue),rgba(247,241,232,.16),var(--accent));
  filter:blur(.2px);
  opacity:.86;
  animation:orbMove 8s ease-in-out infinite;
}
.auth-kicker{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.auth-hero h1{font-family:var(--syne);font-size:clamp(48px,6vw,86px);font-weight:740;line-height:.90;letter-spacing:-.055em;max-width:620px;margin-top:18px}
.auth-hero p{max-width:370px;color:var(--muted);line-height:1.65;margin-top:18px}
.proof-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1}
.proof{border:1px solid var(--line);border-radius:20px;background:rgba(5,6,9,.34);backdrop-filter:blur(18px);padding:15px}
.proof strong{display:block;font-family:var(--sans);font-size:26px;font-weight:800;letter-spacing:-.05em}
.proof span{display:block;color:var(--dim);font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;margin-top:4px}
.card{
  position:relative;
  background:linear-gradient(145deg,rgba(247,241,232,.11),rgba(247,241,232,.045));
  border:1px solid var(--line);
  border-radius:30px;
  padding:30px;
  width:100%;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.11);
  backdrop-filter:blur(24px);
}
.card-title{font-family:var(--syne);font-size:34px;font-weight:740;color:var(--ink);margin-bottom:8px;letter-spacing:-.045em}
.card-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.55}
.tabs{display:flex;gap:5px;margin-bottom:24px;background:rgba(247,241,232,.065);border:1px solid var(--line);border-radius:999px;padding:4px}
.tab{flex:1;padding:9px 10px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:800;cursor:pointer;border-radius:999px;font-family:var(--sans);transition:all .18s}
.tab.active{background:var(--ink);color:var(--bg)}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:7px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.field input{width:100%;background:rgba(5,6,9,.34);border:1px solid var(--line);border-radius:16px;padding:13px 14px;color:var(--ink);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:rgba(157,255,179,.48);box-shadow:0 0 0 4px rgba(157,255,179,.08)}
.field input::placeholder{color:rgba(247,241,232,.28)}
.btn-primary{width:100%;padding:14px;background:var(--ink);border:none;border-radius:999px;color:var(--bg);font-size:14px;font-weight:900;cursor:pointer;font-family:var(--sans);margin-top:8px;transition:.18s ease;letter-spacing:-.01em}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 22px 60px rgba(247,241,232,.16)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:12px;height:12px;border:1.5px solid currentColor;border-right-color:transparent;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:-2px}
.msg{font-size:13px;padding:11px 14px;border-radius:16px;margin-top:14px;display:none}
.msg.error{background:rgba(255,113,130,.10);border:1px solid rgba(255,113,130,.22);color:var(--red)}
.msg.success{background:rgba(157,255,179,.10);border:1px solid rgba(157,255,179,.22);color:var(--green)}
.fine{font-size:11px;color:var(--dim);text-align:center;margin-top:20px;line-height:1.65}
.fine a{color:var(--muted)!important;text-decoration:none}
@keyframes orbMove{
  0%,100%{transform:rotate(-8deg) translateY(0)}
  50%{transform:rotate(8deg) translateY(-18px)}
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:860px){
  body{padding:92px 16px 24px}
  .logo{top:20px;left:20px}
  .auth-shell{grid-template-columns:1fr}
  .auth-hero{min-height:340px;padding:28px;border-radius:28px}
  .auth-hero h1{font-size:48px}
  .proof-row{grid-template-columns:1fr}
  .card{padding:24px 20px;border-radius:24px}
  .card-title{font-size:30px}
  .tabs{margin-bottom:20px}
  .field input{font-size:16px;padding:11px 14px} /* 16px prevents iOS zoom */
  .btn-primary{padding:13px;font-size:15px}
}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27><rect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%23050609%27/><circle cx=%2716%27 cy=%2716%27 r=%278%27 stroke=%27%23F7F1E8%27 stroke-width=%272%27 fill=%27none%27/><circle cx=%2716%27 cy=%2716%27 r=%274%27 fill=%27%23F7F1E8%27/></svg>">
</head>
<body>
<a class="logo" href="/">
  <div class="logo-mark" aria-hidden="true">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="7" cy="7" r="3" fill="currentColor"/>
      <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <span class="logo-text">Inflaid</span>
</a>

<main class="auth-shell">
<section class="auth-hero">
  <div>
    <div class="auth-kicker">Creator budget control</div>
    <h1>Sign in. Make the call.</h1>
    <p>Your creator reads, campaign memory, and next outreach call in one place.</p>
  </div>
  <div class="proof-row">
    <div class="proof"><strong>84</strong><span>Decision read</span></div>
    <div class="proof"><strong>Pay</strong><span>Action</span></div>
    <div class="proof"><strong>Low</strong><span>Risk</span></div>
  </div>
</section>

<div class="card">
  <div class="card-title">Welcome back</div>
  <div class="card-sub" id="card-sub">Get back to the decision room.</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('signin')">Sign in</button>
    <button class="tab" onclick="switchTab('signup')">Start free</button>
  </div>

  <div id="form-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="signIn()">Enter Inflaid</button>
    <div style="text-align:center;margin-top:14px"><button onclick="switchTab('reset')" style="background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;font-family:var(--sans)">Forgot password?</button></div>
  </div>

  <div id="form-reset" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="you@example.com">
    </div>
    <button class="btn-primary" onclick="sendReset()">Send reset link</button>
    <div style="text-align:center;margin-top:14px"><button onclick="switchTab('signin')" style="background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;font-family:var(--sans)">Back to sign in</button></div>
  </div>

  <div id="form-signup" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 8 characters">
    </div>
    <button class="btn-primary" onclick="signUp()">Start free</button>
  </div>

  <div id="form-update" style="display:none">
    <div class="field">
      <label>New password</label>
      <input type="password" id="newpwd" placeholder="Min. 8 characters">
    </div>
    <button class="btn-primary" onclick="updatePassword()">Set new password</button>
  </div>

  <div class="msg" id="msg"></div>

  <div class="fine">By continuing, you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy</a>.</div>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://qpfjxbsvymlrbeoqwqmr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmp4YnN2eW1scmJlb3F3cW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzY3MzgsImV4cCI6MjA4OTU1MjczOH0.d16JZphML2HPIYrXm9oEegQc8GpL-tZA36HpWJAFZNw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const RAILWAY_URL = "https://vettly-production-63d5.up.railway.app";
const API = RAILWAY_URL;
const APP_ORIGIN = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? window.location.origin
  : "https://inflaid.com";

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (event && event.target && event.target.classList.contains("tab")) event.target.classList.add("active");
  document.getElementById("form-signin").style.display = tab === "signin" ? "block" : "none";
  document.getElementById("form-signup").style.display = tab === "signup" ? "block" : "none";
  document.getElementById("form-reset").style.display = tab === "reset" ? "block" : "none";
  const subs = { signin: "Get back to the decision room.", signup: "Two free creator reads. No card.", reset: "We will send a clean reset link." };
  document.getElementById("card-sub").textContent = subs[tab] || "";
  hideMsg();
}

async function sendReset() {
  const email = document.getElementById("reset-email").value.trim();
  if (!email) return showMsg("Please enter your email.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Sending...";
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: APP_ORIGIN + "/auth.html?mode=update"
  });
  btn.disabled = false; btn.textContent = "Send reset link";
  if (error) showMsg(error.message, "error");
  else showMsg("Check your email for a password reset link.", "success");
}

async function updatePassword() {
  const pwd = document.getElementById("newpwd").value;
  if (!pwd || pwd.length < 8) return showMsg("Password must be at least 8 characters.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Saving...";
  const { error } = await sb.auth.updateUser({ password: pwd });
  btn.disabled = false; btn.textContent = "Set new password";
  if (error) showMsg(error.message, "error");
  else { showMsg("Password updated! Redirecting...", "success"); setTimeout(() => window.location.href = "/dashboard.html", 1500); }
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}

function hideMsg() {
  document.getElementById("msg").style.display = "none";
}

function showPasswordUpdateForm() {
  document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
  ["form-signin","form-signup","form-reset"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
  document.getElementById("form-update").style.display = "block";
  document.querySelector(".card-title").textContent = "Reset password";
  document.getElementById("card-sub").textContent = "Choose a new password.";
}

function setBtnBusy(btn, text) {
  if (!btn) return;
  btn.disabled = true;
  btn.dataset.prevHtml = btn.innerHTML;
  btn.innerHTML = `<span class="spinner"></span> ${text}`;
}

function resetBtnBusy(btn) {
  if (!btn) return;
  btn.disabled = false;
  if (btn.dataset.prevHtml) btn.innerHTML = btn.dataset.prevHtml;
}

async function signIn() {
  const email = document.getElementById("signin-email").value.trim();
  const password = document.getElementById("signin-password").value;
  if (!email || !password) return showMsg("Please fill in all fields.", "error");
  const btn = event.target;
  setBtnBusy(btn, "Signing in...");
  const { data: signInData, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showMsg(error.message, "error"); resetBtnBusy(btn); }
  else {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan");
    if (plan) {
      setBtnBusy(btn, "Opening checkout...");
      const token = signInData.session?.access_token;
      const res = await fetch(`${API}/create-checkout`, {
        method: "POST", headers: {"Content-Type":"application/json", "Authorization": `Bearer ${token}`},
        body: JSON.stringify({plan})
      });
      const d = await res.json().catch(() => ({}));
      if (!res.ok) {
        showMsg(d.detail || "Could not start checkout.", "error");
        resetBtnBusy(btn);
        return;
      }
      if (d.url) { window.location.href = d.url; return; }
      showMsg("Checkout link was not returned.", "error");
      resetBtnBusy(btn);
      return;
    }
    window.location.href = "/dashboard.html";
  }
}

async function signUp() {
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  if (!email || !password) return showMsg("Please fill in all fields.", "error");
  if (password.length < 8) return showMsg("Password must be at least 8 characters.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Starting...";
  const { error } = await sb.auth.signUp({ email, password });
  if (error) { showMsg(error.message, "error"); btn.disabled = false; btn.textContent = "Start free"; return; }

  // Apply referral bonus if ?ref= present
  const refCode = new URLSearchParams(window.location.search).get("ref");
  if (refCode) {
    try {
      await fetch(`${API}/referral/apply`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ referrer_code: refCode, new_email: email })
      });
    } catch(e) { /* non-blocking */ }
  }

  showMsg("Check your email to confirm your account." + (refCode ? " Your referral bonus will be applied on first login." : ""), "success");
}

// Pre-fill signup tab if referred
(function(){
  const ref = new URLSearchParams(window.location.search).get("ref");
  if (ref) {
    document.addEventListener("DOMContentLoaded", () => {
      const tabs = document.querySelectorAll(".tab");
      if (tabs[1]) tabs[1].click();
    });
  }
})();

// Handle password recovery redirect
if (new URLSearchParams(window.location.search).get("mode") === "update") {
  showPasswordUpdateForm();
} else if (window.location.hash.includes("access_token=") && window.location.hash.includes("type=recovery")) {
  showPasswordUpdateForm();
} else {
  // Check if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "/dashboard.html";
  });
}

sb.auth.onAuthStateChange((event) => {
  if (event === "PASSWORD_RECOVERY") {
    showPasswordUpdateForm();
  }
});
</script>
</body>
</html>
