<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflaid — Sign in</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F7F4;--s1:#FFFFFF;--s2:#F3F1EE;--s3:#EDEAE5;
  --b1:#E4E0D9;--b2:#D8D3CB;
  --accent:#3B6EF5;--accent-lo:rgba(59,110,245,.08);--accent-mid:rgba(59,110,245,.18);
  --green:#16A34A;--red:#DC2626;
  --ink:#1A1714;--ink2:#6B6360;--ink3:#A09C97;
  --syne:'Bricolage Grotesque',sans-serif;--sans:'DM Sans',-apple-system,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px}
.logo-mark{width:24px;height:24px;background:var(--accent);border-radius:6px;position:relative}
.logo-mark::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#fff;border-radius:50%}
.logo-text{font-family:var(--syne);font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.card-title{font-family:var(--syne);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.02em}
.card-sub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.tabs{display:flex;gap:0;margin-bottom:28px;background:var(--s2);border-radius:8px;padding:3px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--ink3);font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;font-family:var(--sans);transition:all .15s}
.tab.active{background:var(--accent);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--ink2);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;color:var(--ink);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--ink3)}
.btn-primary{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--syne);margin-top:8px;transition:background .15s;letter-spacing:-.01em}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none}
.msg.error{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.18);color:var(--red)}
.msg.success{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.18);color:var(--green)}
.fine{font-size:11px;color:var(--ink3);text-align:center;margin-top:20px;line-height:1.6}

@media(max-width:480px){
  body{padding:16px;align-items:stretch;justify-content:flex-start;padding-top:40px}
  .logo{justify-content:center;margin-bottom:28px}
  .card{padding:24px 20px;border-radius:12px}
  .card-title{font-size:20px}
  .tabs{margin-bottom:20px}
  .field input{font-size:16px;padding:11px 14px} /* 16px prevents iOS zoom */
  .btn-primary{padding:13px;font-size:15px}
}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27><rect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%233B6EF5%27/><text x=%2716%27 y=%2723%27 text-anchor=%27middle%27 font-size=%2720%27 font-family=%27system-ui%27 font-weight=%27bold%27 fill=%27white%27>V</text></svg>">
</head>
<body>
<a class="logo" href="/">
  <div class="logo-mark"></div>
  <span class="logo-text">Inflaid</span>
</a>

<div class="card">
  <div class="card-title">Welcome back</div>
  <div class="card-sub" id="card-sub">Sign in to your account to continue.</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('signin')">Sign in</button>
    <button class="tab" onclick="switchTab('signup')">Create account</button>
  </div>

  <div id="form-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="signIn()">Sign in →</button>
    <div style="text-align:center;margin-top:12px"><button onclick="switchTab('reset')" style="background:none;border:none;color:var(--ink3);font-size:12px;cursor:pointer;font-family:var(--sans)">Forgot password?</button></div>
  </div>

  <div id="form-reset" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="you@example.com">
    </div>
    <button class="btn-primary" onclick="sendReset()">Send reset link →</button>
    <div style="text-align:center;margin-top:12px"><button onclick="switchTab('signin')" style="background:none;border:none;color:var(--ink3);font-size:12px;cursor:pointer;font-family:var(--sans)">← Back to sign in</button></div>
  </div>

  <div id="form-signup" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 8 characters">
    </div>
    <button class="btn-primary" onclick="signUp()">Create account →</button>
  </div>

  <div id="form-update" style="display:none">
    <div class="field">
      <label>New password</label>
      <input type="password" id="newpwd" placeholder="Min. 8 characters">
    </div>
    <button class="btn-primary" onclick="updatePassword()">Set new password →</button>
  </div>

  <div class="msg" id="msg"></div>

  <div class="fine">By continuing, you agree to our <a href="/terms" style="color:var(--ink2)">Terms of Service</a> and <a href="/privacy" style="color:var(--ink2)">Privacy Policy</a>.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://qpfjxbsvymlrbeoqwqmr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmp4YnN2eW1scmJlb3F3cW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzY3MzgsImV4cCI6MjA4OTU1MjczOH0.d16JZphML2HPIYrXm9oEegQc8GpL-tZA36HpWJAFZNw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const RAILWAY_URL = "https://vettly-production-63d5.up.railway.app";
const API = RAILWAY_URL;
const APP_ORIGIN = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? window.location.origin
  : "https://inflaid.com";

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (event && event.target && event.target.classList.contains("tab")) event.target.classList.add("active");
  document.getElementById("form-signin").style.display = tab === "signin" ? "block" : "none";
  document.getElementById("form-signup").style.display = tab === "signup" ? "block" : "none";
  document.getElementById("form-reset").style.display = tab === "reset" ? "block" : "none";
  const subs = { signin: "Sign in to your account to continue.", signup: "Create your free Inflaid account.", reset: "Enter your email to receive a password reset link." };
  document.getElementById("card-sub").textContent = subs[tab] || "";
  hideMsg();
}

async function sendReset() {
  const email = document.getElementById("reset-email").value.trim();
  if (!email) return showMsg("Please enter your email.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Sending...";
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: APP_ORIGIN + "/auth.html?mode=update"
  });
  btn.disabled = false; btn.textContent = "Send reset link →";
  if (error) showMsg(error.message, "error");
  else showMsg("Check your email for a password reset link.", "success");
}

async function updatePassword() {
  const pwd = document.getElementById("newpwd").value;
  if (!pwd || pwd.length < 8) return showMsg("Password must be at least 8 characters.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Saving...";
  const { error } = await sb.auth.updateUser({ password: pwd });
  btn.disabled = false; btn.textContent = "Set new password →";
  if (error) showMsg(error.message, "error");
  else { showMsg("Password updated! Redirecting...", "success"); setTimeout(() => window.location.href = "/dashboard.html", 1500); }
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}

function hideMsg() {
  document.getElementById("msg").style.display = "none";
}

function showPasswordUpdateForm() {
  document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
  ["form-signin","form-signup","form-reset"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
  document.getElementById("form-update").style.display = "block";
  document.querySelector(".card-title").textContent = "Reset password";
  document.getElementById("card-sub").textContent = "Choose a new password for your account.";
}

async function signIn() {
  const email = document.getElementById("signin-email").value.trim();
  const password = document.getElementById("signin-password").value;
  if (!email || !password) return showMsg("Please fill in all fields.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Signing in...";
  const { data: signInData, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showMsg(error.message, "error"); btn.disabled = false; btn.textContent = "Sign in →"; }
  else {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan");
    if (plan) {
      const token = signInData.session?.access_token;
      const res = await fetch(`${API}/create-checkout`, {
        method: "POST", headers: {"Content-Type":"application/json", "Authorization": `Bearer ${token}`},
        body: JSON.stringify({plan})
      });
      const d = await res.json();
      if (d.url) { window.location.href = d.url; return; }
    }
    window.location.href = "/dashboard.html";
  }
}

async function signUp() {
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  if (!email || !password) return showMsg("Please fill in all fields.", "error");
  if (password.length < 8) return showMsg("Password must be at least 8 characters.", "error");
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Creating account...";
  const { error } = await sb.auth.signUp({ email, password });
  if (error) { showMsg(error.message, "error"); btn.disabled = false; btn.textContent = "Create account →"; return; }

  // Apply referral bonus if ?ref= present
  const refCode = new URLSearchParams(window.location.search).get("ref");
  if (refCode) {
    try {
      await fetch(`${API}/referral/apply`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ referrer_code: refCode, new_email: email })
      });
    } catch(e) { /* non-blocking */ }
  }

  showMsg("Check your email to confirm your account." + (refCode ? " Your referral bonus will be applied on first login." : ""), "success");
}

// Pre-fill signup tab if referred
(function(){
  const ref = new URLSearchParams(window.location.search).get("ref");
  if (ref) {
    document.addEventListener("DOMContentLoaded", () => {
      const tabs = document.querySelectorAll(".tab");
      if (tabs[1]) tabs[1].click();
    });
  }
})();

// Handle password recovery redirect
if (new URLSearchParams(window.location.search).get("mode") === "update") {
  showPasswordUpdateForm();
} else if (window.location.hash.includes("access_token=") && window.location.hash.includes("type=recovery")) {
  showPasswordUpdateForm();
} else {
  // Check if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "/dashboard.html";
  });
}

sb.auth.onAuthStateChange((event) => {
  if (event === "PASSWORD_RECOVERY") {
    showPasswordUpdateForm();
  }
});
</script>
</body>
</html>
