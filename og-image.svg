<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F7F4"/>
      <stop offset="100%" style="stop-color:#EDE9E3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#E4E0D9" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#E4E0D9" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#E4E0D9" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#E4E0D9" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="120" y="200" width="56" height="56" rx="12" fill="#3B6EF5"/>
  <circle cx="148" cy="228" r="10" fill="#ffffff"/>

  <!-- Brand name -->
  <text x="192" y="241" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="40" font-weight="900" fill="#1A1714" letter-spacing="-1">inflaid</text>

  <!-- Tagline -->
  <text x="120" y="302" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#6B6360">Stop guessing which influencer will convert.</text>

  <!-- Main headline -->
  <text x="120" y="390" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="52" font-weight="900" fill="#1A1714" letter-spacing="-1.5">Know who converts</text>
  <text x="120" y="452" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="52" font-weight="900" fill="#3B6EF5" letter-spacing="-1.5">before you spend.</text>

  <!-- Badge pills -->
  <rect x="120" y="494" width="130" height="36" rx="18" fill="#EBF0FE" stroke="#BFCFFC" stroke-width="1"/>
  <text x="185" y="517" font-family="'Arial', sans-serif" font-size="14" font-weight="600" fill="#3B6EF5" text-anchor="middle">7 ROI Factors</text>

  <rect x="264" y="494" width="148" height="36" rx="18" fill="#EBF0FE" stroke="#BFCFFC" stroke-width="1"/>
  <text x="338" y="517" font-family="'Arial', sans-serif" font-size="14" font-weight="600" fill="#3B6EF5" text-anchor="middle">AI Fraud Detection</text>

  <rect x="426" y="494" width="130" height="36" rx="18" fill="#EBF0FE" stroke="#BFCFFC" stroke-width="1"/>
  <text x="491" y="517" font-family="'Arial', sans-serif" font-size="14" font-weight="600" fill="#3B6EF5" text-anchor="middle">Free to Start</text>

  <!-- Right side: score card illustration -->
  <rect x="760" y="140" width="320" height="360" rx="16" fill="#FFFFFF" stroke="#E4E0D9" stroke-width="1.5"/>

  <!-- Score card header -->
  <rect x="760" y="140" width="320" height="64" rx="16" fill="#3B6EF5"/>
  <rect x="760" y="172" width="320" height="32" fill="#3B6EF5"/>
  <text x="920" y="178" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">INFLAID SCORE</text>

  <!-- Score number -->
  <text x="920" y="258" font-family="'Arial Black', sans-serif" font-size="72" font-weight="900" fill="#1A1714" text-anchor="middle">84</text>
  <rect x="862" y="272" width="116" height="24" rx="12" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="920" y="289" font-family="'Arial', sans-serif" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">HIGH POTENTIAL</text>

  <!-- Factor bars -->
  <text x="790" y="330" font-family="'Arial', sans-serif" font-size="11" fill="#6B6360">Engagement Quality</text>
  <rect x="790" y="336" width="240" height="6" rx="3" fill="#E4E0D9"/>
  <rect x="790" y="336" width="196" height="6" rx="3" fill="#3B6EF5"/>

  <text x="790" y="360" font-family="'Arial', sans-serif" font-size="11" fill="#6B6360">Audience Reliability</text>
  <rect x="790" y="366" width="240" height="6" rx="3" fill="#E4E0D9"/>
  <rect x="790" y="366" width="168" height="6" rx="3" fill="#3B6EF5"/>

  <text x="790" y="390" font-family="'Arial', sans-serif" font-size="11" fill="#6B6360">Niche Depth</text>
  <rect x="790" y="396" width="240" height="6" rx="3" fill="#E4E0D9"/>
  <rect x="790" y="396" width="216" height="6" rx="3" fill="#3B6EF5"/>

  <!-- Verdict -->
  <rect x="790" y="432" width="240" height="44" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="910" y="459" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#16A34A" text-anchor="middle">✓ Worth Working With</text>
</svg>
