<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vettly — Influencer Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090D;--s1:#0B0F16;--s2:#0F1520;--s3:#131A26;
  --b1:#1C2638;--b2:#24304A;--b3:#2E3C56;
  --accent:#4F8CF5;--accent-lo:rgba(79,140,245,.08);--accent-mid:rgba(79,140,245,.22);
  --green:#34C77A;--green-lo:rgba(52,199,122,.08);--green-mid:rgba(52,199,122,.2);
  --amber:#E8962A;--amber-lo:rgba(232,150,42,.08);--amber-mid:rgba(232,150,42,.2);
  --red:#D95050;--red-lo:rgba(217,80,80,.08);--red-mid:rgba(217,80,80,.2);
  --ink:#DDE4F0;--ink2:#8896B0;--ink3:#3D4E68;
  --syne:'Syne',sans-serif;--sans:'Geist',-apple-system,sans-serif;
  --sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;display:flex;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeup{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.05s}.d2{animation-delay:.10s}.d3{animation-delay:.15s}.d4{animation-delay:.20s}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh}
.sb-logo{display:flex;align-items:center;gap:9px;padding:18px 20px;border-bottom:1px solid var(--b1)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;position:relative;flex-shrink:0}
.logo-mark::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:#fff;border-radius:50%}
.logo-text{font-family:var(--syne);font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--ink3);cursor:pointer;transition:all .15s;border:1px solid transparent;text-decoration:none}
.nav-item:hover{background:var(--s2);color:var(--ink2)}
.nav-item.active{background:var(--accent-lo);color:var(--accent);border-color:var(--accent-mid)}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.5}
.nav-item.active .nav-icon{opacity:1}
.sb-footer{padding:12px;border-top:1px solid var(--b1)}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--accent-lo);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--accent);flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:var(--ink)}
.user-plan{font-size:10px;color:var(--ink3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;background:var(--s1)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink3);cursor:pointer;transition:color .15s;background:none;border:none;font-family:var(--sans);padding:0}
.back-btn:hover{color:var(--ink2)}
.topbar-sep{width:1px;height:16px;background:var(--b1)}
.topbar-crumb{font-size:13px;color:var(--ink2)}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.tbtn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;border:none}
.tbtn-ghost{background:transparent;border:1px solid var(--b2);color:var(--ink2)}
.tbtn-ghost:hover{border-color:var(--b3);color:var(--ink)}
.tbtn-solid{background:var(--accent);color:#fff}
.tbtn-solid:hover{background:#5F9AF7}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.layout{display:grid;grid-template-columns:280px 1fr;gap:20px;max-width:1100px;margin:0 auto}

/* LEFT COLUMN */
.profile-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;margin-bottom:12px}
.profile-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;margin-bottom:14px}
.profile-name{font-family:var(--syne);font-size:16px;font-weight:700;color:var(--ink);margin-bottom:3px;letter-spacing:-.02em}
.profile-handle{font-size:12px;color:var(--ink3);margin-bottom:12px}
.profile-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ptag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--b1);color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
.profile-stats{display:flex;flex-direction:column;gap:8px}
.pstat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.pstat-row:last-child{border-bottom:none}
.pstat-label{font-size:12px;color:var(--ink3)}
.pstat-val{font-size:13px;font-weight:500;color:var(--ink)}

.score-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;margin-bottom:12px;text-align:center}
.score-big{font-family:var(--syne);font-size:56px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:8px}
.score-verdict{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:500;border:1px solid;margin-bottom:10px}
.score-bench{font-size:12px;color:var(--ink3)}
.score-bench span{font-weight:500}

/* VERDICT CARD */
.verdict-card{border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid}
.verdict-label-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.verdict-badge{font-family:var(--syne);font-size:13px;font-weight:700;letter-spacing:-.01em}
.verdict-meta{display:flex;flex-direction:column;gap:7px}
.verdict-meta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.verdict-meta-row:last-child{border-bottom:none}
.vml{font-size:11px;color:var(--ink3)}
.vmv{font-size:12px;font-weight:500}

/* RIGHT COLUMN */
.section-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;margin-bottom:12px}
.sec-title{font-family:var(--syne);font-size:14px;font-weight:600;color:var(--ink);margin-bottom:16px;letter-spacing:-.01em}

/* DECISION CARD */
.decision-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;margin-bottom:12px}
.decision-reason{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:12px}
.decision-action{border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;font-weight:500;border-left:3px solid}

/* ROI FORECAST CARD */
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.roi-cell{background:var(--s2);border-radius:8px;padding:12px;border:1px solid var(--b1)}
.roi-cell-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.roi-cell-val{font-family:var(--syne);font-size:18px;font-weight:700;color:var(--ink)}
.roi-cell-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.roi-aov-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.roi-aov-label{font-size:12px;color:var(--ink3);white-space:nowrap}
.roi-aov-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 10px;color:var(--ink);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s}
.roi-aov-input:focus{border-color:var(--accent)}
.roi-revenue{background:var(--accent-lo);border:1px solid var(--accent-mid);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.roi-rev-label{font-size:12px;color:var(--ink2)}
.roi-rev-val{font-family:var(--syne);font-size:16px;font-weight:700;color:var(--accent)}
.roi-note{font-size:11px;color:var(--ink3);margin-top:10px;line-height:1.5}
.roi-confidence{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--b1);color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}

/* SCORE BREAKDOWN */
.factor-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--b1)}
.factor-row:last-child{border-bottom:none}
.factor-left{flex:1}
.factor-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.factor-desc{font-size:11px;color:var(--ink3)}
.factor-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:80px}
.factor-score{font-family:var(--syne);font-size:16px;font-weight:700}
.factor-bar-wrap{width:80px}
.factor-track{height:3px;background:var(--b1);border-radius:2px;overflow:hidden}
.factor-fill{height:3px;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1)}

/* INSIGHT */
.insight-box{background:var(--s2);border-radius:9px;padding:14px 16px;font-size:13px;color:var(--ink2);line-height:1.7;border-left:3px solid;font-weight:400}

/* OUTREACH */
.outreach-textarea{width:100%;min-height:180px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:13px;color:var(--ink2);font-size:13px;line-height:1.75;resize:none;outline:none;font-family:var(--sans);font-weight:400;transition:border-color .15s;margin-bottom:10px}
.outreach-textarea:focus{border-color:var(--b2)}
.outreach-btns{display:flex;gap:8px}
.obtn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);text-align:center;transition:all .15s;border:none}
.obtn-solid{background:var(--accent);color:#fff}
.obtn-solid:hover{background:#5F9AF7}
.obtn-ghost{background:transparent;border:1px solid var(--b2);color:var(--ink2)}
.obtn-ghost:hover{border-color:var(--b3);color:var(--ink)}

/* NOT RECOMMENDED */
.not-rec{background:var(--red-lo);border:1px solid var(--red-mid);border-radius:9px;padding:14px 16px;font-size:13px;color:var(--red);line-height:1.6;margin-bottom:12px}
@media(max-width:768px){
  .sidebar{display:none}
  .main{width:100vw}
  .topbar{padding:0 12px;gap:8px;height:48px}
  .topbar-actions .tbtn:not(.tbtn-solid){display:none}
  .content{padding:12px}
  .layout{grid-template-columns:1fr!important;gap:12px}
  .roi-grid{grid-template-columns:1fr!important}
  .roi-aov-row{flex-direction:column;align-items:stretch;gap:6px}
  .profile-card,.score-card,.verdict-card{margin-bottom:8px}
  .factor-bar-wrap{width:60px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="sidebar">
  <div class="sb-logo">
    <div class="logo-mark"></div>
    <span class="logo-text">Vettly</span>
  </div>
  <nav class="sb-nav">
    <div style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;padding:10px 10px 5px;font-weight:500">Workspace</div>
    <a class="nav-item active" href="/dashboard.html">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Discovery
    </a>
    <a class="nav-item" href="/dashboard.html#outreach">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Outreach
    </a>
    <a class="nav-item" href="/dashboard.html#analytics">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12L5 8L8 10L11 5L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

    </a>
  </nav>
  <div class="sb-footer">

      <div class="user-av" id="sb-av">?</div>

    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <div class="topbar-sep"></div>
    <div class="topbar-crumb" id="tb-crumb">Loading...</div>
    <div class="topbar-actions">
      <button class="tbtn tbtn-ghost" onclick="copyTemplate()">Copy outreach</button>
      <button class="tbtn tbtn-solid">Add to campaign</button>
    </div>
  </div>

  <div class="content">
    <div class="layout" id="layout" style="display:none">

      <!-- LEFT -->
      <div>
        <div class="profile-card fadeup">
          <div class="profile-av" id="p-av"></div>
          <div class="profile-name" id="p-name"></div>
          <div class="profile-handle" id="p-handle"></div>
          <div class="profile-tags" id="p-tags"></div>
          <div class="profile-stats" id="p-stats"></div>
        </div>

        <div class="score-card fadeup d1">
          <div class="score-big" id="s-big"></div>
          <div class="score-verdict" id="s-verdict"></div>
          <div class="score-bench" id="s-bench"></div>
        </div>

        <div id="verdict-card-wrap" class="fadeup d2"></div>
      </div>

      <!-- RIGHT -->
      <div>
        <div id="not-rec-banner"></div>

        <div id="decision-card-wrap"></div>

        <div id="roi-card-wrap" class="fadeup d2"></div>

        <div class="section-card fadeup d2">
          <div class="sec-title">Why this score</div>
          <div class="insight-box" id="insight-box"></div>
        </div>

        <div class="section-card fadeup d3">
          <div class="sec-title">Score breakdown</div>
          <div id="factor-list"></div>
        </div>

        <div class="section-card fadeup d4">
          <div class="sec-title">Outreach template</div>
          <textarea class="outreach-textarea" id="outreach-ta" readonly></textarea>
          <div class="outreach-btns">
            <button class="obtn obtn-solid" onclick="copyTemplate()">Copy to clipboard</button>
            <button class="obtn obtn-ghost">Mark as sent</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qpfjxbsvymlrbeoqwqmr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmp4YnN2eW1scmJlb3F3cW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzY3MzgsImV4cCI6MjA4OTU1MjczOH0.d16JZphML2HPIYrXm9oEegQc8GpL-tZA36HpWJAFZNw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const RAILWAY_URL = "https://vettly-production-63d5.up.railway.app";
const API = (window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1")
  ? RAILWAY_URL : RAILWAY_URL;

const LBL={
  elite:{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)",txt:"Elite ROI potential"},
  high:{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)",txt:"High conversion potential"},
  mid:{bg:"var(--amber-lo)",col:"var(--amber)",brd:"var(--amber-mid)",txt:"Aesthetic — conversion uncertain"},
  risky:{bg:"var(--red-lo)",col:"var(--red)",brd:"var(--red-mid)",txt:"Risk — review carefully"},
  avoid:{bg:"var(--red-lo)",col:"var(--red)",brd:"var(--red-mid)",txt:"Avoid — not recommended"}
};
const CATS={skincare:"Skincare",makeup:"Makeup",haircare:"Hair care",fragrance:"Fragrance"};

function sc(s){return s>=70?"var(--green)":s>=40?"var(--amber)":"var(--red)";}
function scHex(s){return s>=70?"#34C77A":s>=40?"#E8962A":"#D95050";}

function fmtFollowers(n){
  if(!n||n==="—")return"—";
  if(typeof n==="string")return n;
  if(n>=1000000)return(n/1000000).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(1)+"K";
  return n.toLocaleString();
}

function fmtNum(n){
  if(!n&&n!==0)return"—";
  if(n>=1000)return(n/1000).toFixed(1)+"K";
  return n.toString();
}

function verdictColors(v){
  if(v==="gifted")return{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)"};
  if(v==="paid")return{bg:"var(--accent-lo)",col:"var(--accent)",brd:"var(--accent-mid)"};
  return{bg:"var(--red-lo)",col:"var(--red)",brd:"var(--red-mid)"};
}

function riskColor(r){
  if(!r)return"var(--ink2)";
  const lo=r.toLowerCase();
  if(lo.includes("low"))return"var(--green)";
  if(lo.includes("med"))return"var(--amber)";
  return"var(--red)";
}

let _roiData=null;

function calcRevenue(aov){
  if(!_roiData)return null;
  const lo=Math.round(_roiData.estimated_conversions_low*(aov||0));
  const hi=Math.round(_roiData.estimated_conversions_high*(aov||0));
  return{lo,hi};
}

function updateRevenue(){
  const aov=parseFloat(document.getElementById("aov-input")?.value)||0;
  const rev=calcRevenue(aov);
  const el=document.getElementById("revenue-val");
  if(!el||!rev)return;
  el.textContent=aov>0?`$${rev.lo.toLocaleString()} – $${rev.hi.toLocaleString()}`:"Enter AOV above";
}

function buildTpl(inf){
  const v=inf.verdict;
  const first=(inf.name||inf.handle.replace("@","")).split(" ")[0];
  const campType=v?.campaign_type||"content";
  const action=v?.action||"Share only if you love it.";
  return`Hi ${first},\n\nI've been following your content and it genuinely stood out to me.\n\n[Brand name] creates beauty products, and based on your profile I think your audience would connect with what we make.\n\nWe'd love to send you a complimentary product for a ${campType} collaboration.\n\n${action}\n\nWould you be open to chatting?\n\n[Your name]`;
}

function copyTemplate(){
  const ta=document.getElementById("outreach-ta");
  if(!ta)return;
  if(navigator.clipboard)navigator.clipboard.writeText(ta.value);
  else{ta.select();document.execCommand("copy");}
  document.querySelectorAll(".obtn-solid").forEach(b=>{
    const old=b.textContent;b.textContent="Copied ✓";b.style.background="#2D6A4F";
    setTimeout(()=>{b.textContent=old;b.style.background="var(--accent)";},2000);
  });
}

function randomColor(handle){
  const colors=["#4F8CF5","#34C77A","#A78BFA","#F59E0B","#6EE7B7","#C084FC","#F87171","#FB923C"];
  let n=0;for(const c of handle)n+=c.charCodeAt(0);
  return colors[n%colors.length];
}

function render(inf){
  const label=inf.label||"mid";
  const l=LBL[label]||LBL.mid;
  const color=inf.color||randomColor(inf.handle);
  const v=inf.verdict||null;
  const roi=inf.roi_estimate||null;

  document.title=`Vettly — ${inf.name||inf.handle}`;
  document.getElementById("tb-crumb").textContent=inf.name||inf.handle;
  document.getElementById("layout").style.display="grid";

  // Avatar
  const av=document.getElementById("p-av");
  const initials=(inf.name||inf.handle.replace("@","")).slice(0,2).toUpperCase();
  av.textContent=initials;
  av.style.background=color+"18";av.style.border=`1px solid ${color}30`;av.style.color=color;

  document.getElementById("p-name").textContent=inf.name||inf.handle;
  document.getElementById("p-handle").textContent=inf.handle;

  const tags=document.getElementById("p-tags");
  tags.innerHTML="";
  (inf.platforms||["instagram"]).forEach(p=>{
    const s=document.createElement("span");s.className="ptag";s.textContent=p;tags.appendChild(s);
  });
  if(inf.cat){const c=document.createElement("span");c.className="ptag";c.textContent=CATS[inf.cat]||inf.cat;tags.appendChild(c);}

  const followersDisplay=fmtFollowers(inf.followers||inf.followersRaw);
  document.getElementById("p-stats").innerHTML=`
    <div class="pstat-row"><span class="pstat-label">Followers</span><span class="pstat-val">${followersDisplay}</span></div>
    <div class="pstat-row"><span class="pstat-label">Platform</span><span class="pstat-val">${(inf.platforms||["instagram"]).map(p=>p[0].toUpperCase()+p.slice(1)).join(", ")}</span></div>
    ${inf.cat?`<div class="pstat-row"><span class="pstat-label">Category</span><span class="pstat-val">${CATS[inf.cat]||inf.cat}</span></div>`:""}
    <div class="pstat-row"><span class="pstat-label">Ranking</span><span class="pstat-val" style="color:${sc(inf.score)}">${inf.bench||"Analyzed"}</span></div>`;

  // Score
  document.getElementById("s-big").textContent=inf.score;
  document.getElementById("s-big").style.color=sc(inf.score);
  const sv=document.getElementById("s-verdict");
  sv.textContent=l.txt;sv.style.background=l.bg;sv.style.color=l.col;sv.style.borderColor=l.brd;
  document.getElementById("s-bench").innerHTML=`<span style="color:${sc(inf.score)};font-weight:500">${inf.bench||"Analyzed"}</span>`;

  // Verdict card (left column)
  const vc=document.getElementById("verdict-card-wrap");
  if(v){
    const vc_colors=verdictColors(v.verdict);
    vc.innerHTML=`<div class="verdict-card" style="background:${vc_colors.bg};border-color:${vc_colors.brd}">
      <div class="verdict-label-row">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L9 5.5H13.5L9.75 8.5L11.25 13L7 10.25L2.75 13L4.25 8.5L0.5 5.5H5L7 1Z" fill="${vc_colors.col}" opacity=".7"/></svg>
        <span class="verdict-badge" style="color:${vc_colors.col}">${v.verdict_label||v.verdict}</span>
      </div>
      <div class="verdict-meta">
        <div class="verdict-meta-row">
          <span class="vml">Campaign type</span>
          <span class="vmv" style="color:var(--ink)">${v.campaign_type||"—"}</span>
        </div>
        <div class="verdict-meta-row">
          <span class="vml">Budget</span>
          <span class="vmv" style="color:${vc_colors.col};font-size:11px">${v.budget_range||"—"}</span>
        </div>
        <div class="verdict-meta-row">
          <span class="vml">Risk</span>
          <span class="vmv" style="color:${riskColor(v.risk)}">${v.risk||"—"}</span>
        </div>
      </div>
    </div>`;
  } else {
    // fallback: best for
    const bestFor=inf.bestFor||[];
    vc.innerHTML=`<div class="verdict-card" style="background:var(--s1);border-color:${bestFor.length?'var(--b1)':'var(--red-mid)'};${bestFor.length?'':'background:var(--red-lo)'}">
      <div class="best-title" style="font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;font-weight:500">Best for</div>
      ${bestFor.length
        ? bestFor.map(b=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1);font-size:13px;color:var(--ink2)"><div style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0"></div>${b}</div>`).join('')
        : `<div style="font-size:13px;color:var(--red);line-height:1.55">Not recommended for paid partnerships.</div>`
      }
    </div>`;
  }

  // Not rec banner
  document.getElementById("not-rec-banner").innerHTML=(label==="avoid"||label==="risky"||label==="low")
    ?`<div class="not-rec">Risk signals detected — bot activity, engagement drops, or over-sponsorship. Review carefully before proceeding.</div>`:"";

  // Decision card (right column top)
  const dc=document.getElementById("decision-card-wrap");
  if(v){
    const dc_colors=verdictColors(v.verdict);
    dc.innerHTML=`<div class="decision-card fadeup d1">
      <div class="sec-title">Campaign recommendation</div>
      <div class="decision-reason">${v.reason||""}</div>
      <div class="decision-action" style="background:${dc_colors.bg};border-color:${dc_colors.col};color:${dc_colors.col}">${v.action||""}</div>
    </div>`;
  } else {dc.innerHTML="";}

  // ROI Forecast card
  const rc=document.getElementById("roi-card-wrap");
  if(roi){
    _roiData=roi;
    rc.innerHTML=`<div class="section-card fadeup d2">
      <div class="sec-title">ROI Forecast</div>
      <span class="roi-confidence">${roi.confidence||"medium"} confidence</span>
      <div class="roi-grid">
        <div class="roi-cell">
          <div class="roi-cell-label">Estimated reach</div>
          <div class="roi-cell-val">${fmtNum(roi.estimated_reach_low)}–${fmtNum(roi.estimated_reach_high)}</div>
          <div class="roi-cell-sub">views per post</div>
        </div>
        <div class="roi-cell">
          <div class="roi-cell-label">Conversions</div>
          <div class="roi-cell-val">${roi.estimated_conversions_low}–${roi.estimated_conversions_high}</div>
          <div class="roi-cell-sub">estimated orders</div>
        </div>
      </div>
      <div class="roi-aov-row">
        <span class="roi-aov-label">Your average order value ($)</span>
        <input class="roi-aov-input" id="aov-input" type="number" min="0" placeholder="e.g. 45" oninput="updateRevenue()">
      </div>
      <div class="roi-revenue">
        <span class="roi-rev-label">Estimated revenue</span>
        <span class="roi-rev-val" id="revenue-val">Enter AOV above</span>
      </div>
      ${roi.note?`<div class="roi-note">${roi.note}</div>`:""}
    </div>`;
  } else {rc.innerHTML="";}

  // Insight
  const ib=document.getElementById("insight-box");
  ib.textContent=inf.insight||"";
  ib.style.borderColor=scHex(inf.score)+"66";

  // Breakdown
  const breakdown=inf.breakdown||[];
  document.getElementById("factor-list").innerHTML=breakdown.map(f=>{
    const name=f.name||f.label||f.key||"—";
    const desc=f.desc||f.description||"";
    const val=f.val??f.value??0;
    const wt=f.weight??0;
    const wtStr=Math.abs(wt)<=1?(wt>=0?"+":"")+Math.round(wt*100)+"%":(wt>0?"+":"")+wt+"%";
    return`<div class="factor-row">
      <div class="factor-left">
        <div class="factor-name">${name} <span style="font-size:10px;color:var(--ink3);font-weight:400">(${wtStr})</span></div>
        <div class="factor-desc">${desc}</div>
      </div>
      <div class="factor-right">
        <div class="factor-score" style="color:${scHex(val)}">${val}</div>
        <div class="factor-bar-wrap"><div class="factor-track"><div class="factor-fill" style="width:${val}%;background:${scHex(val)}"></div></div></div>
      </div>
    </div>`;
  }).join('');

  // Outreach
  document.getElementById("outreach-ta").value=buildTpl(inf);
}

function showLoading(){
  document.getElementById("tb-crumb").textContent="Loading…";
  document.getElementById("layout").style.display="none";
}

function showError(msg){
  document.getElementById("tb-crumb").textContent="Error";
  document.body.insertAdjacentHTML("beforeend",
    `<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)">
      <div style="text-align:center;color:var(--ink2)">
        <div style="font-size:32px;margin-bottom:12px">⚠</div>
        <div style="font-size:14px;margin-bottom:8px">${msg}</div>
        <button onclick="history.back()" style="margin-top:16px;padding:8px 20px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:var(--sans);font-size:13px;cursor:pointer">← Go back</button>
      </div>
    </div>`);
}

function historyKey(email){return"vettly_history_"+email;}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const handle=params.get("handle");
  if(!handle){showError("No influencer specified.");return;}
  showLoading();

  const {data:sessionData}=await sb.auth.getSession();
  const email=sessionData?.session?.user?.email;

  // Update sidebar
  if(email){
    const initials=email.slice(0,2).toUpperCase();
    document.getElementById("sb-av").textContent=initials;
    document.getElementById("sb-name").textContent=email.split("@")[0];
  }

  // Try localStorage cache first
  if(email){
    try{
      const history=JSON.parse(localStorage.getItem(historyKey(email))||"[]");
      const cached=history.find(r=>r.handle===handle||r.handle===handle.replace(/^@?/,"@"));
      if(cached){render(cached);return;}
    }catch(e){}
  }

  // Fresh API call
  try{
    const body={handle};
    if(email)body.user_email=email;
    const res=await fetch(`${API}/score`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok)throw new Error(`API ${res.status}`);
    const data=await res.json();

    const inf={
      handle:data.handle,
      name:data.name||(data.handle.replace("@","").replace(/[._]/g," ").replace(/\b\w/g,c=>c.toUpperCase())),
      followers:data.followers,
      platforms:["instagram"],
      cat:null,
      color:randomColor(data.handle),
      score:data.score,
      label:data.label,
      insight:data.insight,
      breakdown:data.breakdown,
      verdict:data.verdict||null,
      roi_estimate:data.roi_estimate||null,
      bench:data.score>=85?"Top 15%":data.score>=70?"Top 30%":data.score>=50?"Mid tier":"Lower tier",
      mock:data.mock,
    };
    render(inf);
  }catch(e){
    showError("Could not load influencer data.<br><small>"+e.message+"</small>");
  }
}

// Auth guard
sb.auth.getSession().then(({data})=>{
  if(!data.session)window.location.href="/auth.html";
});

init();
</script>
</body>
</html>
