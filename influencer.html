<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflaid — Influencer Detail</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F7F4;--s1:#FFFFFF;--s2:#F3F1EE;--s3:#EDEAE5;
  --b1:#E4E0D9;--b2:#D8D3CB;--b3:#CCC7BE;
  --accent:#3B6EF5;--accent-lo:rgba(59,110,245,.08);--accent-mid:rgba(59,110,245,.18);
  --green:#16A34A;--green-lo:rgba(22,163,74,.08);--green-mid:rgba(22,163,74,.2);
  --amber:#D97706;--amber-lo:rgba(217,119,6,.08);--amber-mid:rgba(217,119,6,.18);
  --red:#DC2626;--red-lo:rgba(220,38,38,.08);--red-mid:rgba(220,38,38,.18);
  --ink:#1A1714;--ink2:#6B6360;--ink3:#A09C97;
  --syne:'Bricolage Grotesque',sans-serif;--sans:'DM Sans',-apple-system,sans-serif;
  --sidebar:220px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;display:flex;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fadeup{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.05s}.d2{animation-delay:.10s}.d3{animation-delay:.15s}.d4{animation-delay:.20s}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh}
.sb-logo{display:flex;align-items:center;gap:9px;padding:18px 20px;border-bottom:1px solid var(--b1)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;position:relative;flex-shrink:0}
.logo-mark::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:#fff;border-radius:50%}
.logo-text{font-family:var(--syne);font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--ink3);cursor:pointer;transition:all .15s;border:1px solid transparent;text-decoration:none}
.nav-item:hover{background:var(--s2);color:var(--ink2)}
.nav-item.active{background:var(--accent-lo);color:var(--accent);border-color:var(--accent-mid)}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.5}
.nav-item.active .nav-icon{opacity:1}
.sb-footer{padding:12px;border-top:1px solid var(--b1)}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--accent-lo);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--accent);flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:var(--ink)}
.user-plan{font-size:10px;color:var(--ink3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;background:var(--s1)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink3);cursor:pointer;transition:color .15s;background:none;border:none;font-family:var(--sans);padding:0;text-decoration:none}
.back-btn:hover{color:var(--ink2)}
.topbar-sep{width:1px;height:16px;background:var(--b1)}
.topbar-crumb{font-size:13px;color:var(--ink2)}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.tbtn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;border:none}
.tbtn-ghost{background:transparent;border:1px solid var(--b2);color:var(--ink2)}
.tbtn-ghost:hover{border-color:var(--b3);color:var(--ink)}
.tbtn-solid{background:var(--accent);color:#fff}
.tbtn-solid:hover{background:#5F9AF7}
.save-topbtn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;border:1px solid var(--b2);background:transparent;color:var(--ink2)}
.save-topbtn:hover{border-color:var(--amber-mid);color:var(--amber)}
.save-topbtn.saved{border-color:var(--amber-mid);background:var(--amber-lo);color:var(--amber)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.layout{display:grid;grid-template-columns:268px 1fr;gap:18px;max-width:1060px;margin:0 auto}

/* LEFT COLUMN */
.left-col{display:flex;flex-direction:column;gap:12px}

/* IDENTITY CARD */
.id-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px}
.id-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;margin-bottom:12px}
.id-name{font-family:var(--syne);font-size:16px;font-weight:700;color:var(--ink);margin-bottom:2px;letter-spacing:-.02em}
.id-handle{font-size:12px;color:var(--ink3);margin-bottom:12px}
.id-stats{display:flex;flex-direction:column;gap:0}
.id-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.id-stat:last-child{border-bottom:none}
.id-stat-label{font-size:11px;color:var(--ink3)}
.id-stat-val{font-size:12px;font-weight:500;color:var(--ink)}

/* SCORE CARD */
.score-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;text-align:center}
.score-big{font-family:var(--syne);font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:6px;color:var(--ink2)!important}
.score-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:500;border:1px solid;margin-bottom:8px}
.score-tier{font-size:11px;color:var(--ink3)}

/* VERDICT SUMMARY CARD */
.verdict-sum{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px}
.vs-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.vs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vs-label{font-family:var(--syne);font-size:13px;font-weight:700}
.vs-rows{display:flex;flex-direction:column;gap:0}
.vs-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.vs-row:last-child{border-bottom:none}
.vs-key{font-size:11px;color:var(--ink3)}
.vs-val{font-size:12px;font-weight:500}
.warn-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.04)}
.warn-pill{font-size:10px;color:var(--amber);background:var(--amber-lo);border:1px solid var(--amber-mid);border-radius:5px;padding:3px 8px;line-height:1.4}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:12px}

/* ACTION CARD — hero element */
.action-card{border-radius:12px;padding:20px;border:1px solid}
.ac-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.09em;font-weight:600;opacity:.7;margin-bottom:6px}
.ac-action{font-family:var(--syne);font-size:14px;font-weight:700;letter-spacing:-.02em;line-height:1.5;margin-bottom:16px}
.ac-rows{display:flex;flex-direction:column;gap:0;border-top:1px solid rgba(0,0,0,.07);margin-top:2px}
.ac-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.ac-row:last-child{border-bottom:none}
.ac-row-key{font-size:11px;color:var(--ink3);font-weight:500}
.ac-row-val{font-size:12px;font-weight:600}
.ac-reason{font-size:12px;color:var(--ink2);line-height:1.65;margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,0,0,.07)}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;position:relative;z-index:1}
.card-title{font-family:var(--syne);font-size:13px;font-weight:600;color:var(--ink);margin-bottom:14px;letter-spacing:-.01em}

/* ROI */
.roi-nums{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.roi-cell{background:var(--s2);border-radius:8px;padding:12px;border:1px solid var(--b1)}
.roi-cell-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.roi-cell-val{font-family:var(--syne);font-size:20px;font-weight:700;color:var(--ink)}
.roi-cell-sub{font-size:10px;color:var(--ink3);margin-top:2px}
.roi-conf{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--b1);color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.conf-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.roi-aov-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.roi-aov-lbl{font-size:12px;color:var(--ink3);white-space:nowrap}
.roi-aov-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 10px;color:var(--ink);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s}
.roi-aov-input:focus{border-color:var(--accent)}
.roi-revenue{background:var(--accent-lo);border:1px solid var(--accent-mid);border-radius:8px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
.roi-rev-lbl{font-size:12px;color:var(--ink2)}
.roi-rev-val{font-family:var(--syne);font-size:15px;font-weight:700;color:var(--accent)}
.roi-note{font-size:11px;color:var(--ink3);margin-top:8px;line-height:1.5}

/* EXPANDER — reusable */
.expander-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);cursor:pointer;user-select:none;transition:color .15s;background:none;border:none;font-family:var(--sans);padding:0;margin-top:10px}
.expander-toggle:hover{color:var(--ink2)}
.expander-toggle svg{transition:transform .2s}
.expander-toggle.open svg{transform:rotate(180deg)}
.expander-body{font-size:12px;color:var(--ink2);line-height:1.65;padding-top:8px;display:none}
.expander-body.open{display:block}

/* DECISION BAR */
.decision-bar{border-radius:12px;padding:20px 24px;border:1.5px solid;margin-bottom:18px;display:none;align-items:flex-start;gap:0;max-width:1060px;margin-left:auto;margin-right:auto;position:relative;z-index:2}
.db-left{min-width:210px;border-right:1px solid rgba(0,0,0,.09);padding-right:22px;margin-right:22px}
.db-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:6px}
.db-verdict-label{font-family:var(--syne);font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:8px}
.db-action{font-size:13px;line-height:1.45;font-weight:600}
.db-directive{font-size:11px;margin-top:8px;padding:5px 10px;border-radius:5px;background:rgba(0,0,0,.07);display:inline-block;font-weight:600;letter-spacing:.01em}
.db-pills{display:flex;gap:10px;flex-wrap:wrap;flex:1;align-items:center}
.db-pill{display:flex;flex-direction:column;gap:3px;padding:9px 14px;background:rgba(255,255,255,.55);border-radius:8px;border:1px solid rgba(0,0,0,.07)}
.db-pill-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:600}
.db-pill-val{font-family:var(--syne);font-size:14px;font-weight:700;line-height:1}

/* KEY SIGNALS */
.signals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.signal-box{border-radius:9px;padding:14px;border:1px solid}
.signal-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:8px}
.signal-text{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:4px}
.signal-sub{font-size:11px;line-height:1.55;opacity:.75}

/* CAMPAIGN CHECKLIST */
.camp-checklist{display:flex;flex-direction:column}
.camp-item{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--b1)}
.camp-item:last-child{border-bottom:none}
.camp-key{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:600;min-width:68px;flex-shrink:0}
.camp-val{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}

/* ROI FRICTIONLESS */
.roi-flows{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--b1);border-radius:9px;overflow:hidden;margin-bottom:12px}
.roi-flow-cell{padding:14px 16px}
.roi-flow-spend{background:var(--s2)}
.roi-flow-return{background:var(--green-lo);border-left:1px solid var(--green-mid)}
.roi-flow-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:600;margin-bottom:5px}
.roi-flow-val{font-family:var(--syne);font-size:18px;font-weight:800;letter-spacing:-.02em;line-height:1}
.roi-flow-sub{font-size:10px;color:var(--ink3);margin-top:3px}
.roi-multiplier{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border-radius:8px;padding:10px 14px;margin-bottom:10px}
.roi-mult-label{font-size:11px;color:var(--ink2)}
.roi-mult-val{font-family:var(--syne);font-size:15px;font-weight:700}

/* INSIGHT */
.insight-text{font-size:13px;color:var(--ink2);line-height:1.7;border-left:3px solid;padding-left:12px}

/* BREAKDOWN */
.factor-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--b1)}
.factor-row:last-child{border-bottom:none}
.factor-left{flex:1}
.factor-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.factor-desc{font-size:11px;color:var(--ink3)}
.factor-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:76px}
.factor-score{font-family:var(--syne);font-size:15px;font-weight:700}
.factor-track{width:76px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.factor-fill{height:2px;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1)}

/* OUTREACH */
.outreach-ta{width:100%;min-height:160px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:13px;color:var(--ink2);font-size:13px;line-height:1.75;resize:none;outline:none;font-family:var(--sans);transition:border-color .15s;margin-bottom:10px}
.outreach-ta:focus{border-color:var(--b2)}
.outreach-btns{display:flex;gap:8px}
.obtn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);text-align:center;transition:all .15s;border:none}
.obtn-solid{background:var(--accent);color:#fff}
.obtn-solid:hover{background:#5F9AF7}
.obtn-ghost{background:transparent;border:1px solid var(--b2);color:var(--ink2)}
.obtn-ghost:hover{border-color:var(--b3);color:var(--ink)}

/* NOT-REC BANNER */
.not-rec{background:var(--red-lo);border:1px solid var(--red-mid);border-radius:9px;padding:12px 16px;font-size:12px;color:var(--red);line-height:1.55}

@media(max-width:768px){
  /* Core layout — hide sidebar, make body scrollable */
  .sidebar{display:none}
  html,body{height:auto!important;overflow:auto!important}
  body{display:flex;flex-direction:column}
  .main{width:100%;height:auto;overflow:visible}
  .content{flex:1;overflow-y:auto!important;height:auto!important;padding:12px}

  /* Topbar */
  .topbar{padding:0 12px;gap:6px;height:auto;min-height:48px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
  .topbar-crumb{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-actions{gap:6px}
  .topbar-actions .tbtn-ghost{display:none}
  .save-topbtn{padding:5px 10px;font-size:11px}
  .topbar-sep{display:none}
  .back-btn{font-size:12px}

  /* Main content layout — single column */
  .layout{grid-template-columns:1fr!important;gap:10px}

  /* Decision Bar: stack verdict first, pills below */
  .decision-bar{
    flex-direction:column!important;
    padding:14px 16px!important;
    gap:0!important;
    margin-bottom:12px;
    width:100%!important;
    max-width:100%!important;
  }
  .db-left{
    min-width:unset!important;
    border-right:none!important;
    border-bottom:1px solid rgba(0,0,0,.08);
    padding-right:0!important;
    margin-right:0!important;
    padding-bottom:12px;
    margin-bottom:12px;
    width:100%;
  }
  .db-verdict-label{font-size:18px!important}
  .db-pills{flex-wrap:wrap;gap:6px;width:100%}
  .db-pill{flex:1;min-width:calc(50% - 4px);box-sizing:border-box}

  /* Left column identity card */
  .id-card{padding:16px}
  .id-av{width:42px;height:42px;font-size:13px;margin-bottom:10px}
  .id-name{font-size:14px}

  /* Score card */
  .score-card{padding:16px}
  .score-big{font-size:30px!important}

  /* Verdict summary */
  .verdict-sum{padding:14px}

  /* Campaign plan card */
  .card{padding:14px 16px}
  .camp-key{min-width:52px;font-size:9px}
  .camp-val{font-size:12px}

  /* ROI card: vertical flow, no side-by-side columns */
  .roi-flows{grid-template-columns:1fr!important}
  .roi-flow-return{border-left:none!important;border-top:1px solid var(--green-mid)}
  .roi-nums{grid-template-columns:1fr!important}
  .roi-aov-row{flex-direction:column;align-items:stretch;gap:6px}
  .roi-aov-lbl{white-space:normal}
  .roi-multiplier{flex-direction:column;align-items:flex-start;gap:4px}
  .roi-revenue{flex-direction:column;align-items:flex-start;gap:4px}

  /* Key Signals: single column */
  .signals-grid{grid-template-columns:1fr!important}

  /* Outreach buttons */
  .outreach-btns{flex-direction:column}
  .obtn{width:100%}

  /* Factor rows: keep track readable */
  .factor-track{width:60px}
  .factor-right{min-width:60px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="sidebar">
  <div class="sb-logo">
    <div class="logo-mark"></div>
    <span class="logo-text">Inflaid</span>
  </div>
  <nav class="sb-nav">
    <div style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;padding:10px 10px 5px;font-weight:500">Workspace</div>
    <a class="nav-item active" href="/dashboard.html">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Discovery
    </a>
    <a class="nav-item" href="/dashboard.html#outreach">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Outreach
    </a>
    <a class="nav-item" href="/dashboard.html#analytics">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12L5 8L8 10L11 5L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Analytics
    </a>
  </nav>

<script>

const LBL={
  elite:{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)",txt:"Elite ROI potential"},
  high:{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)",txt:"High conversion potential"},
  mid:{bg:"var(--amber-lo)",col:"var(--amber)",brd:"var(--amber-mid)",txt:"Conversion uncertain"},

function sc(s){return s>=70?"var(--green)":s>=40?"var(--amber)":"var(--red)";}
function scHex(s){return s>=70?"#34C77A":s>=40?"#E8962A":"#D95050";}
function perfTier(val){
  if(val>=80)return{label:"Top 10% of beauty creators",col:"var(--green)"};
  if(val>=65)return{label:"Above average for their size",col:"var(--green)"};
  if(val>=40)return{label:"Average — not a differentiator",col:"var(--amber)"};
  return{label:"Below average — bottom third",col:"var(--red)"};
}

function fmtFollowers(n){
  if(!n||n==="—")return"—";
  if(typeof n==="string")return n;
  if(n>=1000000)return(n/1000000).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(1)+"K";
  return n.toLocaleString();
}

function fmtNum(n){
  if(!n&&n!==0)return"—";
  if(n>=1000)return(n/1000).toFixed(1)+"K";
  return n.toString();
}

function verdictColors(v){
  if(v==="gifted")return{bg:"var(--green-lo)",col:"var(--green)",brd:"var(--green-mid)"};
  if(v==="paid")return{bg:"var(--accent-lo)",col:"var(--accent)",brd:"var(--accent-mid)"};
  return{bg:"var(--red-lo)",col:"var(--red)",brd:"var(--red-mid)"};
}

function riskColor(r){
  if(!r)return"var(--ink2)";
  const lo=r.toLowerCase();
  if(lo.includes("low"))return"var(--green)";
  if(lo.includes("med"))return"var(--amber)";
  return"var(--red)";
}

function confDotColor(c){
  if(!c)return"var(--amber)";
  const lo=c.toLowerCase();
  if(lo==="high")return"var(--green)";
  if(lo==="low")return"var(--red)";
  return"var(--amber)";
}

let _roiData=null, _budgetLow=0, _budgetHigh=0;
const DEFAULT_AOV=45;

function calcRevenue(aov){
  if(!_roiData)return null;
  const lo=Math.round(_roiData.estimated_conversions_low*(aov||0));
  const hi=Math.round(_roiData.estimated_conversions_high*(aov||0));
  return{lo,hi};
}

function toggleAovInput(){
  const row=document.getElementById("aov-adjust-row");
  if(!row)return;
  row.style.display=row.style.display==="none"?"flex":"none";
}

function updateRevenue(){
  const aov=parseFloat(document.getElementById("aov-input")?.value)||DEFAULT_AOV;
  const rev=calcRevenue(aov);
  if(!rev)return;
  const retEl=document.getElementById("roi-return-val");
  if(retEl) retEl.textContent=`$${rev.lo.toLocaleString()}–$${rev.hi.toLocaleString()}`;
  const multEl=document.getElementById("roi-mult-val");
  if(multEl&&_budgetLow>0){
    const pLo=Math.round((rev.lo-_budgetLow)/_budgetLow*100);
    const pHi=_budgetHigh>0?Math.round((rev.hi-_budgetHigh)/_budgetHigh*100):pLo;
    const pos=pLo>=0;
    multEl.textContent=pos?`+${pLo}% to +${pHi}%`:`${pLo}% to ${pHi}%`;
    multEl.style.color=pos?'var(--green)':'var(--red)';
  }
}

function toggleExpander(btnId, bodyId){
  const btn=document.getElementById(btnId);
  const body=document.getElementById(bodyId);
  if(!btn||!body)return;
  const open=body.classList.toggle("open");
  btn.classList.toggle("open",open);
}

function buildTpl(inf){
  const v=inf.verdict;
  const first=(inf.name||inf.handle.replace("@","")).split(" ")[0];
  const campType=v?.campaign_type||"content";
  const action=v?.action||"Share only if you love it.";
  return`Hi ${first},\n\nI've been following your content and it genuinely stood out to me.\n\n[Brand name] creates beauty products, and based on your profile I think your audience would connect with what we make.\n\nWe'd love to send you a complimentary product for a ${campType} collaboration.\n\n${action}\n\nWould you be open to chatting?\n\n[Your name]`;
}

async function generateAIOutreach(){
  const inf=window._currentInf;
  if(!inf)return;
  const btn=document.getElementById("ai-gen-btn");
  const ta=document.getElementById("outreach-ta");
  btn.disabled=true;
  btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="animation:spin .8s linear infinite"><path d="M6 1v2M6 9v2M1 6h2M9 6h2M2.5 2.5l1.4 1.4M8.1 8.1l1.4 1.4M2.5 9.5l1.4-1.4M8.1 3.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Generating…`;
  try{
    const {data:sd}=await sb.auth.getSession();
    const token=sd?.session?.access_token;
    const collab=inf.score>=70?"paid":"gifted";
    const res=await fetch(`${API}/outreach`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},
      body:JSON.stringify({
        handle:inf.handle,
        name:inf.name||null,
        followers:inf.followers||null,
        score:inf.score,
        niche:inf.category||"beauty",
        collab_type:collab,
        brand_name:"[Your brand]"
      })
    });
    if(!res.ok)throw new Error("API error");

    document.getElementById("regen-btn").style.display="";
  }catch(e){
    console.error("Outreach API error:", e);
    ta.value=buildTpl(inf); // fallback to static
  }finally{
    btn.disabled=false;
    btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1l.8 2.4L9.2 4l-2.4.8L6 7.2l-.8-2.4L2.8 4l2.4-.8z" fill="currentColor"/><path d="M10 7.5l.4 1.2 1.2.4-1.2.4L10 10.7l-.4-1.2-1.2-.4 1.2-.4z" fill="currentColor"/></svg> Generate with AI`;
  }
}

function regenerateOutreach(){ generateAIOutreach(); }

function copyTemplate(){
  const ta=document.getElementById("outreach-ta");
  if(!ta)return;
  if(navigator.clipboard)navigator.clipboard.writeText(ta.value);
  else{ta.select();document.execCommand("copy");}
  document.querySelectorAll(".obtn-solid").forEach(b=>{
    const old=b.textContent;b.textContent="Copied ✓";b.style.background="#2D6A4F";
    setTimeout(()=>{b.textContent=old;b.style.background="var(--accent)";},2000);
  });
}

function randomColor(handle){
  const colors=["#4F8CF5","#34C77A","#A78BFA","#F59E0B","#6EE7B7","#C084FC","#F87171","#FB923C"];
  let n=0;for(const c of handle)n+=c.charCodeAt(0);
  return colors[n%colors.length];
}

function render(inf){
  window._currentInf=inf;

    }
    const DIRECTIVES={avoid:"Do NOT proceed. Skip this influencer.",risky:"Do NOT pay upfront. Gifted trial only.",mid:"Do not scale. Test with gifted campaign first.",high:"Proceed. Do not pay upfront on first collab.",elite:"Scale immediately. Prioritize this collab."};

      <div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid ${dc.brd}">

        ${actionHTML}
        ${shortReason?`<div style="font-size:11px;margin-top:10px;color:${dc.col};opacity:.7;line-height:1.5;font-style:italic">${shortReason}</div>`:""}
      </div>
      <div class="db-pills" style="flex-direction:column;align-items:stretch;gap:6px;min-width:130px;flex:none">
        ${v.budget_range?`<div class="db-pill"><div class="db-pill-label">Budget</div><div class="db-pill-val" style="color:var(--ink);font-size:12px">${v.budget_range}</div></div>`:""}
        ${v.risk?`<div class="db-pill"><div class="db-pill-label">Risk</div><div class="db-pill-val" style="color:${riskColor(v.risk)};font-size:13px">${v.risk}</div></div>`:""}

        <div class="roi-flow-cell roi-flow-spend">
          <div class="roi-flow-label">You spend</div>
          <div class="roi-flow-val" style="color:var(--ink)">${spendStr}</div>
          <div class="roi-flow-sub">${fmtNum(roi.estimated_reach_low)}–${fmtNum(roi.estimated_reach_high)} views</div>
        </div>
        <div class="roi-flow-cell roi-flow-return">
          <div class="roi-flow-label">You get back</div>
          <div class="roi-flow-val" style="color:var(--green)" id="roi-return-val">${returnStr}</div>
          <div class="roi-flow-sub">${roi.estimated_conversions_low}–${roi.estimated_conversions_high} orders</div>
        </div>
      </div>
      <div class="roi-multiplier">
        <span class="roi-mult-label">ROI</span>
        <span class="roi-mult-val" id="roi-mult-val" style="color:var(--green)">${initRoi}</span>
      </div>
      <div style="font-size:10px;color:var(--ink3);margin-bottom:10px">Based on $${DEFAULT_AOV} avg order value (beauty) · <button onclick="toggleAovInput()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;font-family:var(--sans);padding:0">Adjust</button></div>
      <div id="aov-adjust-row" class="roi-aov-row" style="display:none">
        <span class="roi-aov-lbl">Your AOV ($)</span>
        <input class="roi-aov-input" id="aov-input" type="number" min="0" value="${DEFAULT_AOV}" oninput="updateRevenue()">
      </div>
      ${(breakEven||worstLoss)?`<div style="display:grid;grid-template-columns:${breakEven&&worstLoss>0?"1fr 1fr":"1fr"};gap:8px;margin-top:4px;margin-bottom:12px">
        ${breakEven?`<div style="background:var(--amber-lo);border:1px solid var(--amber-mid);border-radius:8px;padding:10px 13px">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);font-weight:700;margin-bottom:3px">Break-even</div>
          <div style="font-family:var(--syne);font-size:16px;font-weight:800;color:var(--ink)">${breakEven} orders</div>
          <div style="font-size:10px;color:var(--ink3);margin-top:2px">to cover your $${_budgetLow} spend</div>
        </div>`:""}
        ${worstLoss>0?`<div style="background:var(--red-lo);border:1px solid var(--red-mid);border-radius:8px;padding:10px 13px">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--red);font-weight:700;margin-bottom:3px">Worst case</div>
          <div style="font-family:var(--syne);font-size:16px;font-weight:800;color:var(--red)">-$${worstLoss}</div>
          <div style="font-size:10px;color:var(--ink3);margin-top:2px">if only ${roi.estimated_conversions_low} orders — still ${fmtNum(roi.estimated_reach_low)} views</div>
        </div>`:""}
      </div>`:""}
      ${roi.note?`<div class="roi-note">${roi.note}</div>`:""}
      ${expHtml}
    </div>`;
  } else {rcWrap.innerHTML="";}

  // Key signals (replaces generic insight text)
  const sigWrap=document.getElementById("signals-wrap");
  if(sigWrap){
    const breakdown=inf.breakdown||[];
    if(breakdown.length>=2){
      const sorted=[...breakdown].sort((a,b)=>(b.val??b.value??0)-(a.val??a.value??0));
      const best=sorted[0], worst=sorted[sorted.length-1];
      const bestVal=best.val??best.value??0, worstVal=worst.val??worst.value??0;
      const bestTier=perfTier(bestVal), worstTier=perfTier(worstVal);
      sigWrap.innerHTML=`<div class="card">
        <div class="card-title">Key Signals</div>
        <div class="signals-grid">
          <div class="signal-box" style="background:var(--green-lo);border-color:var(--green-mid)">
            <div class="signal-eyebrow" style="color:var(--green)">Biggest Strength</div>
            <div class="signal-text">${best.name||best.label||"—"}</div>
            <div style="margin:6px 0 3px;height:3px;background:rgba(0,0,0,.08);border-radius:2px"><div style="width:${bestVal}%;height:3px;background:${bestTier.col};border-radius:2px"></div></div>
            <div style="font-size:10px;font-weight:600;color:${bestTier.col};margin-bottom:5px">${bestTier.label}</div>
            <div class="signal-sub" style="color:var(--ink2)">${best.desc||best.description||""}</div>
          </div>
          <div class="signal-box" style="background:var(--red-lo);border-color:var(--red-mid)">
            <div class="signal-eyebrow" style="color:var(--red)">Biggest Risk</div>
            <div class="signal-text">${worst.name||worst.label||"—"}</div>
            <div style="margin:6px 0 3px;height:3px;background:rgba(0,0,0,.08);border-radius:2px"><div style="width:${worstVal}%;height:3px;background:${worstTier.col};border-radius:2px"></div></div>
            <div style="font-size:10px;font-weight:600;color:${worstTier.col};margin-bottom:5px">${worstTier.label}</div>
            <div class="signal-sub" style="color:var(--ink2)">${worst.desc||worst.description||""}</div>
          </div>
        </div>
      </div>`;
    } else if(inf.insight){
      sigWrap.innerHTML=`<div class="card"><div class="card-title">Key Signals</div><div style="font-size:13px;color:var(--ink2);line-height:1.65">${inf.insight}</div></div>`;
    } else { sigWrap.innerHTML=""; }
  }

  // Breakdown
  const breakdown=inf.breakdown||[];
  document.getElementById("factor-list").innerHTML=breakdown.map(f=>{
    const name=f.name||f.label||f.key||"—";
    const desc=f.desc||f.description||"";
    const val=f.val??f.value??0;
    const wt=f.weight??0;
    const wtStr=Math.abs(wt)<=1?(wt>=0?"+":"")+Math.round(wt*100)+"%":(wt>0?"+":"")+wt+"%";
    return`<div class="factor-row">
      <div class="factor-left">
        <div class="factor-name">${name}</div>
        <div class="factor-desc">${desc}</div>
      </div>
      <div class="factor-right">
        <div class="factor-score" style="color:${scHex(val)}">${val}</div>
        <div class="factor-track"><div class="factor-fill" style="width:${val}%;background:${scHex(val)}"></div></div>
      </div>
    </div>`;
  }).join('');

  // Outreach
  document.getElementById("outreach-ta").value=buildTpl(inf);
}

function showLoading(){
  document.getElementById("tb-crumb").textContent="Loading…";
  document.getElementById("layout").style.display="none";
}

function showError(msg){
  document.getElementById("tb-crumb").textContent="Error";
  document.body.insertAdjacentHTML("beforeend",
    `<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)">
      <div style="text-align:center;color:var(--ink2)">
        <div style="font-size:32px;margin-bottom:12px">⚠</div>
        <div style="font-size:14px;margin-bottom:8px">${msg}</div>
        <button onclick="window.location.href='/dashboard.html'" style="margin-top:16px;padding:8px 20px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:var(--sans);font-size:13px;cursor:pointer">← Back to dashboard</button>
      </div>
    </div>`);
}

function historyKey(email){return"inflaid_history_"+email;}
function legacyHistoryKey(email){return"vettly_history_"+email;}

function readHistory(email){
  const current = localStorage.getItem(historyKey(email));
  const legacy = localStorage.getItem(legacyHistoryKey(email));
  const history = JSON.parse(current || legacy || "[]");
  if (!current && legacy && history.length) {
    localStorage.setItem(historyKey(email), JSON.stringify(history));
  }
  return history;
}

let _currentHandle=null;

function updateSaveBtn(saved){
  const btn=document.getElementById("save-topbtn");
  const lbl=document.getElementById("save-label");
  const icon=document.getElementById("save-icon");
  if(!btn)return;
  btn.classList.toggle("saved",!!saved);
  lbl.textContent=saved?"Saved":"Save";
  icon.setAttribute("fill",saved?"currentColor":"none");
}

function toggleSave(){
  const email=window._currentEmail;
  if(!email||!_currentHandle)return;
  const key=historyKey(email);
  try{
    const history=readHistory(email);
    const inf=history.find(r=>r.handle===_currentHandle||r.handle===_currentHandle.replace(/^@?/,"@"));
    if(inf){
      inf.saved=!inf.saved;
      localStorage.setItem(key,JSON.stringify(history));
      updateSaveBtn(inf.saved);
    }
  }catch(e){}
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const handle=params.get("handle");
  if(!handle){showError("No influencer specified.");return;}
  showLoading();

  _currentHandle=handle;
  const {data:sessionData}=await sb.auth.getSession();
  const email=sessionData?.session?.user?.email;
  window._currentEmail=email;

  // Update sidebar
  if(email){
    const rawName = sessionData.session.user.user_metadata?.full_name
      || sessionData.session.user.user_metadata?.name
      || email.split("@")[0].replace(/[._-]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
    const initials = rawName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    document.getElementById("sb-av").textContent=initials;
    document.getElementById("sb-name").textContent=rawName;
    sb.from("users").select("plan").eq("email",email).then(({data})=>{
      if(data&&data[0]) document.getElementById("sb-plan").textContent=data[0].plan.charAt(0).toUpperCase()+data[0].plan.slice(1)+" plan";
    });
  }

  // Try localStorage cache first
  if(email){
    try{
      const history=readHistory(email);
      const cached=history.find(r=>r.handle===handle||r.handle===handle.replace(/^@?/,"@"));
      if(cached){render(cached);updateSaveBtn(!!cached.saved);return;}
    }catch(e){}
  }

  // Fresh API call
  const token=sessionData?.session?.access_token;
  if(!token){window.location.href="/auth.html";return;}
  try{
    const res=await fetch(`${API}/score`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},body:JSON.stringify({handle,category:"beauty"})});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const detail=err.detail||"";
      if(res.status===401){
        window.location.href="/auth.html"; return;
      }
      if(res.status===429&&detail.startsWith("limit_reached")){
        showError("You've used all your analyses.<br><a href='/dashboard.html' style='color:var(--accent);font-size:13px'>← Go back to upgrade your plan</a>");
        return;
      }
      throw new Error(`API ${res.status}`);
    }
    const data=await res.json();

    const inf={
      handle:data.handle,
      name:data.name||(data.handle.replace("@","").replace(/[._]/g," ").replace(/\b\w/g,c=>c.toUpperCase())),
      followers:data.followers,
      platforms:["instagram"],
      cat:null,
      color:randomColor(data.handle),
      score:data.score,
      label:data.label,
      insight:data.insight,
      breakdown:data.breakdown,
      verdict:data.verdict||null,
      roi_estimate:data.roi_estimate||null,
      bench:data.score>=85?"Top 15%":data.score>=70?"Top 30%":data.score>=50?"Mid tier":"Lower tier",
      mock:data.mock,
    };
    render(inf);
  }catch(e){
    showError("Could not load influencer data.<br><small>"+e.message+"</small>");
  }
}

// Auth guard
sb.auth.getSession().then(({data})=>{
  if(!data.session)window.location.href="/auth.html";
});

init();
</script>
</body>
</html>
